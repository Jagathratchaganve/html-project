<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="JAGAN">
    <meta name="description" content="Starbucks Store Hours Information">
    <link rel="icon" href="image/startbucks.png" type="image/x-icon">
    <link rel="stylesheet" href="st.css" type="text/css">
    <title>STAR BUCKS HOURS</title>
</head>

<body>

    <!-- Page Wrapper -->
    <div class="page-container">

        <!-- Header -->
        <header>
            <h1><strong>STAR BUCKS SHOP HOURS</strong></h1>

            <!-- Navigation -->
            <nav>
                <ul>
                    <li><a href="sampleproject.html">HOME</a></li>
                    <li><a href="sampleproject.html#aboutus">About <abbr title="STAR BUCKS">ST</abbr></a></li>
                    <li><a href="sampleproject.html#menu">Menu</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </header>

        <!-- Store Image -->
        <figure>
            <img src="image/shop.png"
                 alt="Coffee cup and snacks"
                 title="COFFEE & SNACK"
                 width="200"
                 height="200">
            <figcaption>COFFEE & SNACK</figcaption>
        </figure>

        <hr>

        <!-- Store Hours Section -->
        <section id="storehours">
            <h2>STORE HOURS</h2>

            <table>
                <caption>STAR BUCKS STORE HOURS</caption>

                <thead>
                    <tr>
                        <th scope="col">DAY</th>
                        <th scope="col">OPEN</th>
                        <th scope="col">CLOSE</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>MONDAY – FRIDAY</td>
                        <td><time datetime="06:00">6:00 AM</time></td>
                        <td><time datetime="21:00">9:00 PM</time></td>
                    </tr>

                    <tr>
                        <td>SATURDAY</td>
                        <td><time datetime="07:00">7:00 AM</time></td>
                        <td><time datetime="22:00">10:00 PM</time></td>
                    </tr>

                    <tr>
                        <td>SUNDAY</td>
                        <td><time datetime="08:00">8:00 AM</time></td>
                        <td><time datetime="20:00">8:00 PM</time></td>
                    </tr>
                </tbody>
            </table>

            <hr>

            <!-- Footer Inside Store Hours Section -->
            <footer>
                <p><a href="sampleproject.html">BACK TO HOME</a></p>
                <p><a href="#">BACK TO TOP</a></p>

                <hr>

                <p>&copy; <time datetime="2025">2025</time> STAR BUCKS</p>
            </footer>
        </section>

    </div> <!-- End page-container -->

</body>

</html>
